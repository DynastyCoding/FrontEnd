<h2>頁面B(組件)</h2>

<div>
  <label>使用者名稱</label>
  <input [(ngModel)]="userData.name" placeholder="請輸入名稱" />
  <br />
  <label>使用者信箱</label>
  <input [(ngModel)]="userData.email" placeholder="請輸入信箱" />
  <br />
  <label>使用者地址</label>
  <input [(ngModel)]="userData.address" placeholder="請輸入地址" />
  <br />
  <button (click)="sendData()">發送資料</button>
</div>
